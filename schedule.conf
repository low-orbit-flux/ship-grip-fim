
# ship-grip-fim schedule configuration
# =====================================================
# Loaded by the agent on startup.  Changes made via
# "schedule add/remove" commands are automatically
# saved back to this file.
#
# Format (pipe-separated):
#   name|cronExpression|command
#
# name        - unique job identifier (no spaces)
# cronExpression - standard 5-field cron, or a descriptor:
#                  @hourly   = "0 * * * *"
#                  @daily    = "0 0 * * *"
#                  @weekly   = "0 0 * * 0"
#                  @monthly  = "0 0 1 * *"
# command     - currently only "scan" is supported
#
# Examples:
#   daily_scan|@daily|scan
#   nightly|0 2 * * *|scan
#   every_6h|0 */6 * * *|scan
# =====================================================

