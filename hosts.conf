
# Remote hosts configuration
# ============================================================
# Fields (pipe-separated):
#   alias | address | port | path | reportName | sshUser | binaryPath
#
#   alias       - short name used in CLI output and local sync dirs
#   address     - IP or hostname of the remote agent
#   port        - agent TCP port
#   path        - directory the agent should scan (used by remoteall scan)
#   reportName  - report name prefix on the remote host
#   sshUser     - (optional) SSH user for the 'start' command
#   binaryPath  - (optional) full path to ship-grip-fim binary on remote host
#
# sshUser and binaryPath are only needed for: ship-grip-fim start [alias]
#
# Examples:
# homeserver|192.168.1.10|8080|/data|homeserver
# workstation|192.168.1.20|8080|/home/user|workstation|admin|/usr/local/bin/ship-grip-fim
# offsite|10.0.0.5|9000|/backup|offsite|backup|/opt/ship-grip-fim/ship-grip-fim
# ============================================================

